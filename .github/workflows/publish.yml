# .github/workflows/publish.yml
name: publish
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions: {}

jobs:
  publish:
    uses: skathio/hashira/.github/workflows/nuget-package-publish.yml@780b40fdd21c61643733e8455b47c27a3cd9f37a
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    with:
      project_path: 'SkathIO.Rogue.sln'
      dotnet_version: '10.0.x'
      target: 'https://api.nuget.org/v3/index.json'
      environment_name: 'production'
      library_ref: '780b40fdd21c61643733e8455b47c27a3cd9f37a'
      # OIDC trusted publishing: NuGet/login mints a short-lived key from the
      # job's id-token. No NUGET_API_KEY secret is passed (omitting the
      # secrets: block selects the OIDC path). Verify this matches your
      # nuget.org username.
      nuget_user: 'skathi'
