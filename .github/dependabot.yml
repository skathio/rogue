version: 2
updates:
  # Refresh third-party GitHub Actions pinned by SHA across the repo weekly.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]

  # NuGet dependencies across all projects (src/tests/samples/bench) — Dependabot
  # discovers every .csproj recursively from "/" via the solution. Grouped into
  # one weekly PR to keep review load low; PD-7's MinVer/SourceLink/AOT pins and
  # the transitive dependency allow-list (.github/allowed-packages.txt, enforced
  # by ci.yml's "License check" job) are re-verified by CI on every Dependabot PR
  # like any other PR — a bump that adds a disallowed transitive package fails
  # the allow-list check rather than silently landing.
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      nuget:
        patterns: ["*"]
    ignore:
      # MediatR 13+ moved to a commercial license (Jimmy Bogard, 2025). MediatR is used only
      # as a benchmarks-only comparison baseline (bench/SkathIO.Rogue.Benchmarks), never
      # shipped to consumers, but this repo must not take on a commercial dependency even
      # there. Same-major bumps stay unrestricted; only v13+ is excluded (Directory.Packages.props).
      - dependency-name: "MediatR"
        versions: [">=13.0.0"]
      # Microsoft.CodeAnalysis.CSharp/.Workspaces are compiled into the shipped generator's
      # assembly-reference table, which the consumer's host compiler version-checks at
      # analyzer-load time (CS9057). Verified: 5.6.0 hard-fails on an ~8-month-old SDK
      # (10.0.109) though it loads fine on a current one (CI's 10.0.301) — Roslyn's check is
      # one-directional, so there is no compatibility upside to a higher pin, only downside for
      # consumers on older/pinned SDKs. Held at 5.0.0 (D8/D11, decisions.md#d11) — a Dependabot
      # PR silently bumped this back to 5.6.0 once already (#17) before this ignore rule
      # existed; any future bump here must go through a deliberate, empirically-verified
      # decision, not an automated one.
      - dependency-name: "Microsoft.CodeAnalysis.CSharp"
        versions: [">5.0.0"]
      - dependency-name: "Microsoft.CodeAnalysis.CSharp.Workspaces"
        versions: [">5.0.0"]
